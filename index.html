<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informační systém HAViS / INISS - Simulátor</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --panel-bg: #16161a;
            --accent-color: #00adb5;
            --text-color: #eeeeee;
            --board-text: #ffbc00; /* Typická žlutá/oranžová pro vlakové panely */
            --delay-color: #ff3366;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', -apple-system, sans-serif; background-color: var(--bg-color); color: var(--text-color); padding: 15px; }
        .container { max-width: 1200px; margin: 0 auto; }

        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 15px; }
        h1 { font-size: 1.4rem; color: #fff; }
        .clock { font-size: 1.4rem; font-weight: bold; color: var(--accent-color); font-family: monospace; }

        /* OVLÁDACÍ PANEL DISPEČERA */
        #admin-section { background: var(--panel-bg); padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #2d2d35; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .admin-header h2 { font-size: 1.2rem; }
        
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        input, select, button { padding: 12px 10px; border-radius: 6px; border: 1px solid #3a3a44; background: #22222b; color: #fff; font-size: 1rem; width: 100%; }
        input:focus, select:focus { border-color: var(--accent-color); outline: none; }
        
        button { background: var(--accent-color); color: #000; font-weight: bold; cursor: pointer; border: none; transition: background 0.2s; }
        button:hover { opacity: 0.9; }
        button.download-btn { background: #28a745; color: white; width: auto; padding: 10px 15px; font-size: 0.9rem; }
        button.submit-btn-add { background: #00adb5; color: #000; }

        /* STANIČNÍ PANEL (VZHLED) */
        #board-wrapper { background: #000; padding: 15px; border-radius: 8px; border: 3px solid #222; box-shadow: 0 8px 24px rgba(0,0,0,0.8); }
        .board-title { color: #fff; font-size: 1.1rem; margin-bottom: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        
        .board-table { width: 100%; border-collapse: collapse; color: var(--board-text); font-family: 'Consolas', 'Courier New', monospace; font-size: 1.1rem; }
        .board-table th { background: #111; color: #888; font-family: 'Segoe UI', sans-serif; font-size: 0.9rem; font-weight: normal; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 2px solid #222; }
        .board-table td { padding: 14px 10px; border-bottom: 1px solid #111; vertical-align: middle; }
        .board-table tr:hover td { background: #050505; }
        
        .train-type-bold { color: #fff; font-weight: bold; background: #222; padding: 2px 6px; border-radius: 4px; font-size: 0.95rem; }
        .delay { color: var(--delay-color); font-weight: bold; }
        
        /* IKONOVÁ TLAČÍTKA */
        .btn-icon { width: 38px; height: 38px; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-size: 1.1rem; margin: 2px; border-radius: 50%; }
        .btn-edit { background: #ffc107; color: #000; }
        .btn-delete { background: var(--delay-color); color: #fff; }
        .btn-audio { background: #ffcc00; color: #000; }
        .controls-cell { white-space: nowrap; text-align: right; }

        /* RESPONSIVITA PRO MOBILY (Změna tabulky na karty) */
        @media (max-width: 768px) {
            h1 { font-size: 1.1rem; }
            .admin-header { flex-direction: column; align-items: flex-start; }
            button.download-btn { width: 100%; text-align: center; }
            
            /* Skryjeme klasickou tabulku a přeskládáme ji */
            .board-table thead { display: none; }
            .board-table, .board-table tbody, .board-table tr, .board-table td { display: block; width: 100%; }
            
            .board-table tr { background: #050505; margin-bottom: 15px; border: 1px solid #1c1c22; border-radius: 6px; padding: 10px; }
            .board-table td { border: none; padding: 6px 8px; text-align: left; }
            
            /* Označení dat na mobilu pomocí data-label atributů */
            .board-table td::before { content: attr(data-label) ": "; color: #666; font-family: 'Segoe UI', sans-serif; font-size: 0.85rem; display: inline-block; width: 110px; }
            
            .board-table td.controls-cell { text-align: left; border-top: 1px solid #111; margin-top: 5px; padding-top: 10px; }
            .board-table td.controls-cell::before { display: none; }
            .btn-icon { width: 45px; height: 45px; font-size: 1.2rem; margin-right: 8px; }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

<div class="container">
    <header>
        <h1>HAViS / INISS Panel</h1>
        <div class="clock" id="realtime-clock">00:00:00</div>
    </header>

    <div id="admin-section">
        <div class="admin-header">
            <h2>Dispečerský pultík</h2>
            <button class="download-btn" onclick="downloadBoard()">Stáhnout jako PNG 💾</button>
        </div>
        
        <form id="train-form" onsubmit="saveTrain(event)">
            <input type="hidden" id="edit-id" value="">
            <div class="form-grid">
                <input type="time" id="train-time" required>
                <select id="train-type" required>
                    <option value="Os">Os</option>
                    <option value="Sp">Sp</option>
                    <option value="R">R</option>
                    <option value="Ex">Ex</option>
                    <option value="IC">IC</option>
                    <option value="EC">EC</option>
                </select>
                <input type="number" id="train-number" placeholder="Číslo vlaku (e.g. 782)" required>
                <input type="text" id="train-line" placeholder="Linka (S7)">
                <input type="text" id="train-direction" placeholder="Směr" required>
                <input type="text" id="train-company" placeholder="Dopravce" required>
                <input type="number" id="train-delay" placeholder="Zpoždění (min)" value="0" min="0">
                <button type="submit" id="submit-btn" class="submit-btn-add">➕ Přidat</button>
            </div>
        </form>
    </div>

    <div id="board-wrapper">
        <div class="board-title">Aktuální odjezdy vlaků / Departure board</div>
        <table class="board-table">
            <thead>
                <tr>
                    <th>Čas</th>
                    <th>Druh</th>
                    <th>Číslo</th>
                    <th>Linka</th>
                    <th>Směr (Cílová stanice)</th>
                    <th>Dopravce</th>
                    <th>Zpoždění</th>
                    <th style="text-align: right;">Akce</th>
                </tr>
            </thead>
            <tbody id="board-body"></tbody>
        </table>
    </div>
</div>

<script>
    // Výchozí simulovaná data uložená v LocalStorage
    let trains = JSON.parse(localStorage.getItem('havis_beta_trains')) || [
        { id: "1", time: "14:35", type: 'Os', number: '9341', line: 'S7', direction: 'Praha hl.n.', company: 'České dráhy', delay: 0 },
        { id: "2", time: "14:52", type: 'R', number: '762', line: 'R16', direction: 'Klatovy', company: 'České dráhy', delay: 10 }
    ];

    // Hodiny na panelu
    setInterval(() => {
        document.getElementById('realtime-clock').innerText = new Date().toLocaleTimeString('cs-CZ');
    }, 1000);

    function updateStorageAndRender() {
        // Seřadit vlaky podle času odjezdu
        trains.sort((a, b) => a.time.localeCompare(b.time));
        localStorage.setItem('havis_beta_trains', JSON.stringify(trains));
        renderBoard();
    }

    // Vykreslení tabule s ohledem na mobilní data-label štítky
    function renderBoard() {
        const tbody = document.getElementById('board-body');
        tbody.innerHTML = '';
        
        trains.forEach((train) => {
            const tr = document.createElement('tr');
            
            tr.innerHTML = `
                <td data-label="Čas" style="color: #fff; font-weight: bold;">${train.time}</td>
                <td data-label="Druh"><span class="train-type-bold">${train.type}</span></td>
                <td data-label="Číslo">${train.number}</td>
                <td data-label="Linka" style="color: #00adb5;">${train.line || '-'}</td>
                <td data-label="Směr" style="text-transform: uppercase; font-weight: bold; letter-spacing: 0.5px;">${train.direction}</td>
                <td data-label="Dopravce" style="color: #888; font-size: 0.95rem;">${train.company}</td>
                <td data-label="Zpoždění" class="delay">${train.delay > 0 ? `+${train.delay} min` : 'Pravidelný'}</td>
                <td class="controls-cell">
                    <button class="btn-icon btn-edit" onclick="editTrain('${train.id}')" title="Upravit">📝</button>
                    <button class="btn-icon btn-delete" onclick="deleteTrain('${train.id}')" title="Smazat">🗑️</button>
                    <button class="btn-icon btn-audio" onclick="announceTrain('${train.type}', '${train.number}', '${train.direction}', ${train.delay})" title="Hlásit">🔊</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Uložení / Úprava
    function saveTrain(e) {
        e.preventDefault();
        const id = document.getElementById('edit-id').value;
        
        const trainData = {
            time: document.getElementById('train-time').value,
            type: document.getElementById('train-type').value,
            number: document.getElementById('train-number').value,
            line: document.getElementById('train-line').value,
            direction: document.getElementById('train-direction').value,
            company: document.getElementById('train-company').value,
            delay: parseInt(document.getElementById('train-delay').value) || 0
        };

        if (id === '') {
            trainData.id = Date.now().toString();
            trains.push(trainData);
        } else {
            const index = trains.findIndex(t => t.id === id);
            if (index !== -1) {
                trainData.id = id;
                trains[index] = trainData;
            }
            document.getElementById('edit-id').value = '';
            const subBtn = document.getElementById('submit-btn');
            subBtn.innerText = "➕ Přidat";
            subBtn.className = "submit-btn-add";
        }

        document.getElementById('train-form').reset();
        updateStorageAndRender();
    }

    // Načtení do formuláře při stisku 📝
    function editTrain(id) {
        const train = trains.find(t => t.id === id);
        if (!train) return;

        document.getElementById('edit-id').value = train.id;
        document.getElementById('train-time').value = train.time;
        document.getElementById('train-type').value = train.type;
        document.getElementById('train-number').value = train.number;
        document.getElementById('train-line').value = train.line;
        document.getElementById('train-direction').value = train.direction;
        document.getElementById('train-company').value = train.company;
        document.getElementById('train-delay').value = train.delay;
        
        const subBtn = document.getElementById('submit-btn');
        subBtn.innerText = "💾 Uložit (#)";
        subBtn.className = ""; // Reset barvy na základní modrou pro editaci
        
        // Automatický posun nahoru na mobilu, aby dispečer hned viděl formulář
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Smazání vlaku při stisku 🗑️
    function deleteTrain(id) {
        if (confirm("Opravdu smazat tento spoj z panelu?")) {
            trains = trains.filter(t => t.id !== id);
            updateStorageAndRender();
        }
    }

    // Stažení tabule do PNG obrázku
    function downloadBoard() {
        const element = document.getElementById('board-wrapper');
        html2canvas(element, { backgroundColor: '#000000' }).then(canvas => {
            const link = document.createElement('a');
            link.download = 'stanicni-panel.png';
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    }

    // Staniční hlášení 🔊
    function announceTrain(type, number, direction, delay) {
        playGong();
        let text = `Vlak ${type}, číslo ${number}, ve směru ${direction}, `;
        text += delay > 0 ? `bude na svém příjezdu omluven o přibližně ${delay} minut.` : `je připraven k odjezdu.`;

        setTimeout(() => {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'cs-CZ';
            utterance.rate = 0.92;
            window.speechSynthesis.speak(utterance);
        }, 1200);
    }

    function playGong() {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function tone(freq, start, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.08, start);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.start(start); osc.stop(start + duration);
        }
        tone(554.37, audioCtx.currentTime, 0.4);
        tone(440.00, audioCtx.currentTime + 0.3, 0.6);
    }

    // První spuštění vykreslení
    renderBoard();
</script>
</body>
</html>
